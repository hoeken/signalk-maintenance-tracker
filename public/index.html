<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Maintenance Tracker</title>
    <!-- Icons + manifest are generated from assets/icon.png — see `npm run icons`. -->
    <link rel="icon" href="./icons/favicon.ico" sizes="48x48" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./icons/favicon-32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="./icons/favicon-16.png"
    />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta
      name="theme-color"
      content="#f5f6f8"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#14171a"
      media="(prefers-color-scheme: dark)"
    />
    <!-- iOS home-screen bookmark: run standalone with the app title. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Maintenance" />
    <!-- Set the theme before first paint; ES5 so it runs even without module support. -->
    <script>
      (function () {
        var theme = null;
        // B&G / Navico MFDs pass ?mode=night or ?mode=day instead of honoring
        // prefers-color-scheme; the param overrides everything, including the
        // saved preference.
        var m = location.search.match(/[?&]mode=([^&]*)/);
        if (m) {
          theme = decodeURIComponent(m[1]) === 'night' ? 'dark' : 'light';
        }
        if (theme === null) {
          try {
            theme = localStorage.getItem('smt-theme');
          } catch (e) {
            /* storage may be blocked */
          }
        }
        if (theme !== 'light' && theme !== 'dark') {
          // prefers-color-scheme is Chrome 76+; on Chromium 69 it never matches → light (§7.3)
          theme =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link
      rel="stylesheet"
      href="./vendor/bootstrap-icons/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div id="app"></div>
    <noscript>Maintenance Tracker requires JavaScript.</noscript>
    <script type="module" src="./app/main.js"></script>
  </body>
</html>
